<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KAMBROX</title>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

      :root {
        --bg: oklch(93.5% 0.018 76);
        --fg: oklch(23% 0.012 78);
        --muted: oklch(34% 0.01 78);
        --green: oklch(36% 0.087 154);
        --gold: oklch(66% 0.095 78);
        --bronze: oklch(58% 0.047 62);
        --guide: oklch(74% 0.024 76 / 0.45);
        --font-body: "Pretendard", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 0;
      }

      html {
        background: var(--bg);
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-body);
      }

      a {
        color: inherit;
      }

      .hero-shell {
        background: var(--bg);
        display: grid;
        min-height: 100dvh;
        overflow: hidden;
        place-items: center;
        position: relative;
      }

      .hero-stage {
        position: relative;
        width: 100%;
        z-index: 1;
      }

      .hero {
        aspect-ratio: 1774 / 887;
        background: transparent;
        display: grid;
        grid-template-columns: 700px 1fr;
        position: relative;
        width: 1774px;
      }

      .hero-copy,
      .network {
        position: relative;
        z-index: 1;
      }

      .hero-copy {
        align-self: start;
        padding-left: 92px;
        padding-top: 168px;
        width: 620px;
      }

      .brand {
        display: block;
        height: 82px;
        margin-bottom: 40px;
        text-decoration: none;
        width: 506px;
      }

      .brand-logo {
        display: block;
        height: auto;
        width: 506px;
      }

      h1 {
        color: oklch(25% 0.01 76);
        font-family: var(--font-body);
        font-size: 54px;
        font-weight: 700;
        letter-spacing: -0.052em;
        line-height: 1.22;
        margin: 0;
        text-wrap: balance;
        word-break: keep-all;
      }

      .lead {
        color: oklch(26% 0.009 76);
        font-size: 20px;
        font-weight: 600;
        line-height: 1.68;
        margin: 23px 0 0;
        max-width: 580px;
        text-wrap: pretty;
        word-break: keep-all;
      }

      .process {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(4, minmax(86px, 1fr));
        list-style: none;
        margin: 53px 0 0;
        padding: 0;
        width: 574px;
      }

      .process-item {
        align-items: center;
        display: grid;
        gap: 14px;
        justify-items: center;
        min-width: 0;
        position: relative;
        text-align: center;
      }

      .process-icon {
        display: grid;
        height: 48px;
        place-items: center;
        position: relative;
        width: 56px;
      }

      .process-icon img {
        display: block;
        height: 126px;
        left: 50%;
        object-fit: contain;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 126px;
      }

      .process-label {
        color: oklch(28% 0.008 76);
        font-size: 15px;
        font-weight: 600;
        line-height: 1.4;
        min-height: 2.8em;
        word-break: keep-all;
      }

      .process-arrow {
        border-top: 2px dashed oklch(64% 0.005 80 / 0.52);
        height: 1px;
        left: calc(50% + 38px);
        opacity: 0.62;
        position: absolute;
        top: 24px;
        width: 62px;
      }

      .process-arrow::after {
        border-bottom: 5px solid transparent;
        border-left: 8px solid oklch(64% 0.005 80 / 0.72);
        border-top: 5px solid transparent;
        content: "";
        position: absolute;
        right: -2px;
        top: -6px;
      }

      .network {
        align-self: stretch;
        isolation: isolate;
      }

      .network::before,
      .network::after {
        border: 1px solid var(--guide);
        border-radius: 999px;
        content: "";
        height: 560px;
        left: -24px;
        pointer-events: none;
        position: absolute;
        top: 148px;
        width: 1100px;
        z-index: 0;
      }

      .network::after {
        border-style: dashed;
        height: 410px;
        left: 72px;
        opacity: 0.48;
        top: 218px;
        width: 768px;
      }

      .network-art {
        display: block;
        height: auto;
        left: -65px;
        max-width: none;
        position: absolute;
        top: 90px;
        width: 1180px;
        z-index: 1;
      }

      .network-callout {
        color: var(--fg);
        display: grid;
        gap: 9px;
        position: absolute;
        white-space: pre-line;
        z-index: 2;
      }

      .network-callout strong {
        color: var(--green);
        font-size: 17px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .network-callout span {
        color: oklch(28% 0.009 76);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.58;
        word-break: keep-all;
      }

      .callout-hospital {
        left: 402px;
        top: 122px;
      }

      .callout-analytics {
        left: 624px;
        top: 122px;
      }

      .callout-pharmacy {
        left: 312px;
        top: 682px;
      }

      .callout-home {
        left: 701px;
        top: 682px;
      }

      @media (min-width: 1181px) {
        body {
          min-width: 0;
        }

        .hero-shell {
          min-height: 100dvh;
          padding: clamp(18px, 3.2vw, 72px);
        }

        .hero-stage {
          aspect-ratio: 1774 / 887;
          width: min(1774px, calc(100vw - clamp(36px, 6.4vw, 144px)), calc(200dvh - clamp(72px, 12.8vw, 288px)));
        }

        .hero {
          height: 887px;
          inset: 0;
          position: absolute;
          transform: scale(
            min(
              1,
              calc((100vw - clamp(36px, 6.4vw, 144px)) / 1774px),
              calc((200dvh - clamp(72px, 12.8vw, 288px)) / 1774px)
            )
          );
          transform-origin: top left;
          width: 1774px;
        }
      }

      @media (max-width: 1180px) {
        .network::before,
        .network::after {
          display: none;
        }
      }

      @media (max-width: 1180px) {
        body {
          background: var(--bg);
        }

        .hero-stage {
          width: 100%;
        }

        .hero {
          aspect-ratio: auto;
          display: block;
          height: auto;
          min-height: auto;
          padding: 64px 34px 58px;
          transform: none;
          width: 100%;
        }

        .hero-copy {
          margin: 0 auto;
          max-width: 740px;
          padding-left: 0;
          padding-top: 0;
          width: 100%;
        }

        .network {
          aspect-ratio: 1672 / 941;
          margin: 18px auto 0;
          max-width: 860px;
          width: 100%;
        }

        .network-art {
          inset: 0;
          width: 100%;
        }

        .network-callout {
          display: none;
        }

        .process {
          width: 100%;
        }
      }

      @media (max-width: 680px) {
        .hero {
          padding: 44px 20px 34px;
        }

        .brand {
          height: 74px;
          margin-bottom: 36px;
          width: 290px;
        }

        .brand-logo {
          width: 290px;
        }

        h1 {
          font-size: clamp(38px, 10.5vw, 52px);
          line-height: 1.28;
        }

        .lead {
          font-size: 17px;
        }

        .lead br {
          display: none;
        }

        .process {
          gap: 22px 14px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          margin-top: 44px;
        }

        .process-arrow {
          display: none;
        }

        .network {
          margin-top: 30px;
          transform: scale(1.07);
          transform-origin: center top;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero-shell">
      <div class="hero-stage">
        <section class="hero" aria-label="KAMBROX hero">
          <div class="hero-copy">
            <a class="brand" href="#" aria-label="KAMBROX home">
              <img class="brand-logo" src="mplc24vr-logo-transparent.png" alt="KAMBROX" />
            </a>

            <h1>
              퇴원 이후의 회복,<br />
              데이터로 연결합니다
            </h1>

            <p class="lead">
              캠브록스는 환자의 임상 데이터와 생활 정보를 기반으로<br />
              병원·약국·가정을 연결하여 개인 맞춤 회복을 돕습니다.
            </p>

          <ol class="process" aria-label="회복 관리 흐름">
            <li class="process-item">
              <span class="process-icon">
                <img src="public/images/mpkyy6ix-icon1.png" alt="" />
              </span>
              <span class="process-label">병원 진단 및 데이터</span>
              <i class="process-arrow" aria-hidden="true"></i>
            </li>
            <li class="process-item">
              <span class="process-icon">
                <img src="public/images/mpkyy6iz-icon2.png" alt="" />
              </span>
              <span class="process-label">임상 데이터 분석</span>
              <i class="process-arrow" aria-hidden="true"></i>
            </li>
            <li class="process-item">
              <span class="process-icon">
                <img src="public/images/mpkyy6j0-icon3.png" alt="" />
              </span>
              <span class="process-label">약국 상담 및 관리</span>
              <i class="process-arrow" aria-hidden="true"></i>
            </li>
            <li class="process-item">
              <span class="process-icon">
                <img src="public/images/mpkyy6j0-icon4.png" alt="" />
              </span>
              <span class="process-label">가정에서의 회복 관리</span>
            </li>
          </ol>
        </div>

        <div class="network" aria-label="병원, 데이터 분석, 약국, 가정 연결 다이어그램">
          <img
            class="network-art"
            src="mplcegpj-asset2-transparent.png"
            alt="중앙 KAMBROX 허브와 병원, 데이터 분석, 약국, 가정이 연결된 3D 네트워크"
          />
          <div class="network-callout callout-hospital">
            <strong>병원</strong>
            <span>진단 및 임상 데이터</span>
          </div>
          <div class="network-callout callout-analytics">
            <strong>데이터 분석</strong>
            <span>임상 데이터 분석 및<br />개인 맞춤 인사이트</span>
          </div>
          <div class="network-callout callout-pharmacy">
            <strong>약국</strong>
            <span>약사 상담 및 복약 관리</span>
          </div>
          <div class="network-callout callout-home">
            <strong>가정</strong>
            <span>생활 관리 및<br />회복 지원</span>
          </div>
        </div>
      </section>
      </div>
    </main>
  </body>
</html>
